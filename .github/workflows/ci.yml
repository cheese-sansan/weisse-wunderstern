name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Wheel quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install wheel with test extras
        run: |
          WHEEL=$(find dist -name '*.whl' -print -quit)
          python -m pip install "${WHEEL}[api,documents,dev]"
      - name: Verify installed wheel outside checkout
        run: |
          cd /tmp
          noteforge --version
          python -c "from noteforge import AnalysisRequest; print(AnalysisRequest(topic='wheel'))"
          noteforge run --topic "wheel smoke" --provider mock --job-id wheel-smoke --output-root /tmp/noteforge-output
          noteforge jobs list --output-root /tmp/noteforge-output
          noteforge report wheel-smoke --output-root /tmp/noteforge-output >/dev/null
          noteforge jobs migrate --all --output-root /tmp/noteforge-output
          printf '0\n' | noteforge tui
          noteforge api --help
      - name: Ruff
        run: ruff check src/noteforge tests scripts
      - name: Pyright standard
        run: pyright --pythonpath python src/noteforge
      - name: Pytest and coverage
        run: pytest --cov=noteforge --cov-report=term-missing --cov-fail-under=80
      - name: OpenAPI v1 snapshot
        run: python scripts/check_openapi.py
      - name: API smoke
        run: python scripts/api_smoke.py
      - name: Privacy audit
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/privacy_audit.py

  compatibility:
    name: Python ${{ matrix.python-version }} wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build --wheel
      - name: Install and test wheel
        run: |
          WHEEL=$(find dist -name '*.whl' -print -quit)
          python -m pip install "${WHEEL}[api,documents,dev]"
          pytest -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose config
      - name: Build API image
        run: docker compose build api
