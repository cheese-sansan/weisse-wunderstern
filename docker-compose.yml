name: noteforge

services:
  api:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.10-slim}
        INSTALL_EXTRAS: ${INSTALL_EXTRAS:-false}
    container_name: noteforge-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - MODE=api
      - API_PORT=8000
      - TZ=Asia/Shanghai
      # 可选：LLM API 配置
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      # 文献检索配置
      - LITERATURE_PROVIDER=${LITERATURE_PROVIDER:-crossref}
      - LITERATURE_MAX_RESULTS=${LITERATURE_MAX_RESULTS:-10}
      - LITERATURE_TIMEOUT_SECONDS=${LITERATURE_TIMEOUT_SECONDS:-10}
      - CROSSREF_MAILTO=${CROSSREF_MAILTO:-}
      # 可选：API 鉴权 token
      - API_TOKEN=${API_TOKEN:-}
      # 任务保留天数
      - JOB_RETENTION_DAYS=${JOB_RETENTION_DAYS:-7}
      # 上传限制
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      # 日志级别
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./outputs:/app/outputs
      - ./examples:/app/examples:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
